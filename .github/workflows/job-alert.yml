name: Job Alert Bot

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC
    # KST 02:00 = UTC 17:00 (previous day)
    # KST 10:00 = UTC 01:00
    # KST 18:00 = UTC 09:00
    - cron: "0 1,9,17 * * *"

jobs:
  run-job-alert:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run job alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        run: python job_alert_bot.py

      - name: Commit state file if changed
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git diff --cached --quiet || git commit -m "Update state.json"
            git push
          fi
